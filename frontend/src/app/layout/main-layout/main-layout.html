<div class="layout">

    <aside class="sidebar">
  
      <div class="logo">
        Gestión Proyectos
      </div>
  
      <nav>

        <a
          routerLink="/dashboard"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }">
          Dashboard
        </a>
      
        <a
          routerLink="/proyectos"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }">
          Proyectos

        <button

        </button>
  
      </div>
  
    </aside>
  
    <div class="content">

      <main>
        <router-outlet></router-outlet>

    </div>
