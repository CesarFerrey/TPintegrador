<form [formGroup]="form" class="login-page">

    <div class="login-card">

        <div class="login-header">

            <div class="logo">
                🚀
            </div>

            <h1>Gestión de Proyectos</h1>

            <p>
                Inicia sesión para acceder al sistema
            </p>

        </div>

        <div class="form-group">

            <label for="email">
                Correo Electrónico
            </label>

            <input
                pInputText
                id="email"
                type="text"
                placeholder="Ingresa tu correo"
                formControlName="email" />

        </div>

        <div class="form-group">

            <label for="clave">
                Contraseña
            </label>

            <p-password
                id="password"
                formControlName="password"
                [feedback]="false"
                autocomplete="off"
                placeholder="Ingresa tu contraseña">
            </p-password>

        </div>

        <p-button
            label="Iniciar sesión"
            icon="pi pi-sign-in"
            (click)="iniciarSesion()">
        </p-button>

    </div>

</form>
