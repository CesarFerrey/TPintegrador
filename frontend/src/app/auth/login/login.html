<form [formGroup]="form">
    <div id="main" style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">

        <h2 id="header">Sistema de gestión de proyectos</h2>

        <label for="email" style="display: none;">Correo electrónico</label>
        <input
            pInputText
            id="email"
            name="email"
            type="email"
            placeholder="Correo electrónico"
            formControlName="email"
            autocomplete="email"
            style="width: 100%;"
        />

        <label for="clave" style="display: none;">Clave de acceso</label>
        <p-password
            id="clave"
            name="clave"
            formControlName="clave"
            [feedback]="false"
            autocomplete="current-password"
            placeholder="Clave de acceso"
            style="width: 100%;"
        >
        </p-password>

        <p-button
            label="Iniciar sesión"
            (click)="iniciarSesion()"
            [disabled]="form.invalid"
            [style]="{ width: '100%' }"
        >
        </p-button>

        <div style="margin-top: 0.5rem; font-size: 0.9rem;">
            <span style="color: var(--p-text-muted-color);">¿No tenés cuenta? </span>
            <a 
                routerLink="/registrar" 
                style="color: var(--p-primary-color); font-weight: 600; text-decoration: none; cursor: pointer;"
            >
                Registrate aquí
            </a>
        </div>
        </div>
</form>
