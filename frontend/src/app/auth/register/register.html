<div class="register-container" style="max-width: 350px; margin: 2rem auto; padding: 1.5rem; background: var(--p-content-background); border-radius: 8px;">
    
    <h2 style="text-align: center; margin-bottom: 1.5rem; color: var(--p-text-color);">Crear Cuenta</h2>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" style="display: flex; flex-direction: column; gap: 1.2rem;">
        
        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label for="nombre" style="font-weight: 500; font-size: 0.9rem;">Nombre Completo</label>
            <input pInputText type="text" id="nombre" formControlName="nombre" placeholder="Mínimo 3 caracteres" style="width: 100%;" />
            
            <small *ngIf="registerForm.get('nombre')?.touched && registerForm.get('nombre')?.errors?.['required']" style="color: var(--p-red-500); font-size: 0.8rem;">
                El nombre es obligatorio.
            </small>
            <small *ngIf="registerForm.get('nombre')?.touched && registerForm.get('nombre')?.errors?.['minlength']" style="color: var(--p-red-500); font-size: 0.8rem;">
                Debe tener al menos 3 caracteres.
            </small>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label for="email" style="font-weight: 500; font-size: 0.9rem;">Correo Electrónico</label>
            <input pInputText type="email" id="email" formControlName="email" placeholder="ejemplo@correo.com" style="width: 100%;" />
            
            <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['required']" style="color: var(--p-red-500); font-size: 0.8rem;">
                El correo es obligatorio.
            </small>
            <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.errors?.['email']" style="color: var(--p-red-500); font-size: 0.8rem;">
                Formato de correo inválido.
            </small>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label for="password" style="font-weight: 500; font-size: 0.9rem;">Contraseña</label>
            <p-password id="password" formControlName="password" [feedback]="false" toggleMask="true" placeholder="Mínimo 6 caracteres" style="width: 100%;" />
            
            <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['required']" style="color: var(--p-red-500); font-size: 0.8rem;">
                La contraseña es obligatoria.
            </small>
            <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.errors?.['minlength']" style="color: var(--p-red-500); font-size: 0.8rem;">
                Debe tener al menos 6 caracteres.
            </small>
        </div>

        <div class="form-group" style="display: flex; flex-direction: column; gap: 0.4rem;">
            <label for="confirmPassword" style="font-weight: 500; font-size: 0.9rem;">Confirmar Contraseña</label>
            <p-password id="confirmPassword" formControlName="confirmPassword" [feedback]="false" toggleMask="true" placeholder="Repetí tu contraseña" style="width: 100%;" />
            
            <small *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')" style="color: var(--p-red-500); font-size: 0.8rem;">
                Las contraseñas no coinciden.
            </small>
        </div>

        <p-button type="submit" label="Registrarse" [disabled]="registerForm.invalid" [style]="{ width: '100%', 'margin-top': '0.5rem' }"/>

        <div style="text-align: center; margin-top: 0.5rem; font-size: 0.9rem;">
            <span style="color: var(--p-text-muted-color);">¿Ya tenés cuenta? </span>
            <a routerLink="/login" style="color: var(--p-primary-color); font-weight: 600; text-decoration: none; cursor: pointer;">
                Iniciá sesión
            </a>
        </div>

    </form>
</div>
